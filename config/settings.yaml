llm:
  base_url: "http://localhost:8001/v1"
  api_key: "not-needed"
  model: "./llm_model/qwen3-4b-4bit-mlx"
  max_context_tokens: 32768
  # Alternative model: gpt-oss-20b
  # model_path: ./llm_model/gpt-oss-20b | ./llm_model/qwen3-4b-4bit-mlx

server:
  backend_host: "0.0.0.0"
  backend_port: 8080
  frontend_host: "0.0.0.0"
  frontend_port: 9001
  backend_api_host: "localhost"
  backend_api_port: 8080
  database_path: "data/app.db"
  health_check_interval_seconds: 30

# 작업 알림 채널 (환경변수로 오버라이드 가능)
notifications:
  email:
    enabled: false
    smtp_host: ""
    smtp_port: 587
    smtp_username: ""
    smtp_password: ""
    from_address: ""
    use_tls: true
    use_ssl: false
    timeout_seconds: 30
  teams:
    enabled: false
    mode: "webhook"   # webhook | graph
    webhook_url: ""
    tenant_id: ""
    client_id: ""
    client_secret: ""
    team_id: ""
    channel_id: ""
    timeout_seconds: 30

# 시스템 인벤토리 (ChromaDB) - 환경변수로 오버라이드 가능
inventory:
  chroma_data_path: "data/chroma"
  csv_path: "data/inventory/inventory.csv"
  upload_path: "data/inventory/uploads"

# Whatap 이벤트 수신 webhook
whatap:
  webhook_secret: ""

# 통합 채팅 사용자 대화 로그
user_comm_log:
  log_dir: "data/user_comm_logs"
  retention_days: 30

# 작업요청자 데몬 (수동 "테스트 작업 발송"으로 대체됨, 기본 중지)
job_requester:
  enabled: false
  interval_minutes: 60
  initial_delay_seconds: 60

# Kubernetes/OpenShift 클러스터 주기 수집 (openshift DynamicClient, 동기)
# - 기동 시 전체 1회 수집
# - 이후 매일 00:10 부터 등록 순서대로 5분 간격 (예: dprv6 00:10, pcicd 00:15)
k8s_collector:
  enabled: true
  collect_on_startup: true
  schedule_hour: 0
  schedule_minute: 10
  stagger_minutes: 5
  kubeconfig: ""
  fallback_to_current_context: true
  # contexts:
  #   dtest-k8s: orbstack

# 인증 프로바이더 (환경변수 AUTH_PROVIDER_TYPE / OAUTH_PROXY 로 오버라이드)
auth:
  provider_type: "db"   # db | madang
  oauth_proxy: ""
